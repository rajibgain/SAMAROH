<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SAMAROH</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Poppins',sans-serif;
            min-height:100vh;
            overflow:hidden;
            position:relative;
            background:#020617;
        }

        .background{
            position:fixed;
            inset:0;
            z-index:-10;
        }

        .background::before{

            content:'';

            position:absolute;

            inset:0;

            background:

            linear-gradient(
                rgba(2,6,23,0.7),
                rgba(15,23,42,0.85)
            ),

            url('https://images.unsplash.com/photo-1492684223066-81342ee5ff30?auto=format&fit=crop&w=1600&q=80');

            background-size:cover;
            background-position:center;

            filter:blur(2px);

            transform:scale(1.05);
        }

        .light{
            position:absolute;
            border-radius:50%;
            filter:blur(90px);
            opacity:0.45;
            animation:float 10s infinite ease-in-out;
        }

        .light1{
            width:260px;
            height:260px;
            background:#3b82f6;
            top:-60px;
            left:-60px;
        }

        .light2{
            width:240px;
            height:240px;
            background:#ec4899;
            right:-50px;
            top:20%;
            animation-delay:2s;
        }

        .light3{
            width:220px;
            height:220px;
            background:#8b5cf6;
            bottom:-60px;
            left:35%;
            animation-delay:4s;
        }

        @keyframes float{

            0%{
                transform:translateY(0px);
            }

            50%{
                transform:translateY(-25px);
            }

            100%{
                transform:translateY(0px);
            }
        }

        .main{
            width:100%;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:40px;
        }

        .card{

            width:1300px;
            max-width:100%;

            min-height:700px;

            display:flex;

            overflow:hidden;

            border-radius:35px;

            backdrop-filter:blur(20px);

            background:rgba(255,255,255,0.08);

            border:1px solid rgba(255,255,255,0.1);

            box-shadow:
            0 25px 60px rgba(0,0,0,0.5);
        }

        .left,
        .right{

            width:50%;

            position:relative;

            display:flex;
            justify-content:center;
            align-items:center;

            padding:70px 50px;
        }

        .left::before,
        .right::before{

            content:'';

            position:absolute;

            inset:0;

            z-index:0;
        }

        .left::before{

            background:

            linear-gradient(
                rgba(15,23,42,0.82),
                rgba(30,41,59,0.88)
            ),

            url('https://images.unsplash.com/photo-1511578314322-379afb476865?auto=format&fit=crop&w=1200&q=80');

            background-size:cover;
            background-position:center;
        }

        .right::before{

            background:

            linear-gradient(
                rgba(255,255,255,0.9),
                rgba(248,250,252,0.92)
            ),

            url('https://images.unsplash.com/photo-1515169067868-5387ec356754?auto=format&fit=crop&w=1200&q=80');

            background-size:cover;
            background-position:center;
        }

        .content{
            position:relative;
            z-index:2;
            text-align:center;
        }

        .emoji{
            font-size:90px;
            margin-bottom:25px;
        }

        h1{
            font-size:54px;
            margin-bottom:20px;
        }

        .left h1{
            color:white;
        }

        .right h1{
            color:#020617;
        }

        p{
            font-size:17px;
            line-height:1.8;
            margin-bottom:40px;
            max-width:420px;
        }

        .left p{
            color:#cbd5e1;
        }

        .right p{
            color:#334155;
        }

        button{

            width:300px;

            padding:18px;

            border:none;

            border-radius:18px;

            font-size:17px;

            font-weight:700;

            cursor:pointer;

            transition:0.3s;
        }

        .supervisor-btn{

            background:linear-gradient(
                135deg,
                #3b82f6,
                #7c3aed
            );

            color:white;
        }

        .member-btn{

            background:linear-gradient(
                135deg,
                #111827,
                #334155
            );

            color:white;
        }

        button:hover{
            transform:translateY(-4px);
        }

    </style>

</head>

<body>

    <div class="background">

        <div class="light light1"></div>
        <div class="light light2"></div>
        <div class="light light3"></div>

    </div>

    <div class="main">

        <div class="card">

            <!-- LEFT -->

            <div class="left">

                <div class="content">

                    <div class="emoji">👨‍💼</div>

                    <h1>Supervisor Portal</h1>

                    <p>
                        Manage attendance, monitor activities
                        and supervise the SAMAROH system.
                    </p>

                    <button class="supervisor-btn"
                    onclick="window.location.href='./supervisor.html'">

                        Login as Supervisor

                    </button>

                </div>

            </div>

            <!-- RIGHT -->

            <div class="right">

                <div class="content">

                    <div class="emoji">🎉</div>

                    <h1>Member Portal</h1>

                    <p>
                        Member section coming soon.
                    </p>

                    <button class="member-btn">

                        Coming Soon

                    </button>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
