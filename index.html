<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Supervisor Login</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Poppins',sans-serif;
            min-height:100vh;
            overflow:hidden;
            background:#020617;
            display:flex;
            justify-content:center;
            align-items:center;
            position:relative;
        }

        /* BACKGROUND */

        .background{
            position:absolute;
            inset:0;
            z-index:-1;
            overflow:hidden;
        }

        .background::before{
            content:'';
            position:absolute;
            inset:0;

            background:
            linear-gradient(
                rgba(2,6,23,0.75),
                rgba(15,23,42,0.85)
            ),

            url('https://images.unsplash.com/photo-1511578314322-379afb476865?auto=format&fit=crop&w=1600&q=80');

            background-size:cover;
            background-position:center;

            filter:blur(2px);

            transform:scale(1.05);
        }

        .floating-light{
            position:absolute;
            border-radius:50%;
            filter:blur(90px);
            opacity:0.45;
            animation:float 10s infinite ease-in-out;
        }

        .light1{
            width:260px;
            height:260px;
            background:#3b82f6;
            top:-50px;
            left:-50px;
        }

        .light2{
            width:240px;
            height:240px;
            background:#ec4899;
            right:-50px;
            top:25%;
            animation-delay:2s;
        }

        .light3{
            width:220px;
            height:220px;
            background:#8b5cf6;
            bottom:-50px;
            left:35%;
            animation-delay:4s;
        }

        @keyframes float{

            0%{
                transform:translateY(0px);
            }

            50%{
                transform:translateY(-25px);
            }

            100%{
                transform:translateY(0px);
            }
        }

        /* LOGIN BOX */

        .container{
            width:500px;
            max-width:92%;
        }

        .form-box{

            background:rgba(255,255,255,0.08);

            backdrop-filter:blur(20px);

            border:1px solid rgba(255,255,255,0.1);

            border-radius:30px;

            padding:50px;

            box-shadow:
            0 25px 60px rgba(0,0,0,0.45);

            text-align:center;
        }

        h1{
            color:white;
            font-size:42px;
            margin-bottom:35px;
        }

        input{

            width:100%;

            padding:18px;

            margin-bottom:20px;

            border:none;

            border-radius:16px;

            background:rgba(255,255,255,0.1);

            border:1px solid rgba(255,255,255,0.12);

            color:white;

            font-size:15px;

            outline:none;
        }

        input::placeholder{
            color:#cbd5e1;
        }

        button{

            width:100%;

            padding:18px;

            border:none;

            border-radius:16px;

            background:linear-gradient(
                135deg,
                #2563eb,
                #7c3aed
            );

            color:white;

            font-size:16px;

            font-weight:700;

            cursor:pointer;

            transition:0.3s;
        }

        button:hover{
            transform:translateY(-3px);
        }

    </style>

</head>

<body>

    <div class="background">

        <div class="floating-light light1"></div>

        <div class="floating-light light2"></div>

        <div class="floating-light light3"></div>

    </div>

    <div class="container">

        <div class="form-box">

            <h1>Supervisor Login</h1>

            <input type="text" placeholder="Enter Supervisor ID">

            <input type="text" placeholder="Enter Name">

            <button
            onclick="window.location.href='./supervisor-dashboard.html'">

                Submit

            </button>

        </div>

    </div>

</body>

</html>
