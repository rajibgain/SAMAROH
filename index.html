<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance System</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#f3f4f6;
        }

        .container{
            width:900px;
            height:500px;
            display:flex;
            border-radius:12px;
            overflow:hidden;
            box-shadow:0 5px 20px rgba(0,0,0,0.2);
        }

        .panel-emoji{
            font-size:64px;
            margin-bottom:-10px;
            z-index:2;
        }

        /* LEFT SECTION */

        .left-section{
            width:50%;
            color:white;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            gap:25px;
            padding:40px;
            position:relative;

            background:
            linear-gradient(
                to bottom,
                #1e293b 40%,
                rgba(30,41,59,0.85) 100%
            ),

            url('https://images.unsplash.com/photo-1560250097-0b93528c311a?auto=format&fit=crop&q=80&w=500')
            no-repeat bottom center;

            background-size:cover;
        }

        .left-section h1{
            font-size:32px;
            margin-bottom:20px;
        }

        .login-btn{
            width:250px;
            padding:15px;
            border:none;
            border-radius:8px;
            background:#3b82f6;
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        .login-btn:hover{
            background:#2563eb;
        }

        .signin-link{
            color:#d1d5db;
            text-decoration:none;
            cursor:pointer;
        }

        .signin-link:hover{
            text-decoration:underline;
        }

        /* RIGHT SECTION */

        .right-section{
            width:50%;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            gap:25px;
            padding:40px;
            position:relative;

            background:
            linear-gradient(
                to bottom,
                #ffffff 40%,
                rgba(255,255,255,0.9) 100%
            ),

            url('https://images.unsplash.com/photo-1522071820081-009f0129c71c?auto=format&fit=crop&q=80&w=500')
            no-repeat bottom center;

            background-size:cover;
        }

        .right-section h1{
            font-size:32px;
            color:#111827;
            margin-bottom:20px;
        }

        .member-btn{
            width:250px;
            padding:15px;
            border:none;
            border-radius:8px;
            background:#111827;
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        .member-btn:hover{
            background:#000000;
        }

        .member-signin{
            color:#4b5563;
            text-decoration:none;
            cursor:pointer;
        }

        .member-signin:hover{
            text-decoration:underline;
        }

        /* FORM PAGE */

        .form-page{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#f3f4f6;
        }

        .form-box{
            width:420px;
            background:white;
            padding:40px;
            border-radius:12px;
            box-shadow:0 5px 20px rgba(0,0,0,0.2);
            display:flex;
            flex-direction:column;
            gap:20px;
        }

        .form-box h1{
            text-align:center;
            color:#1e293b;
        }

        .form-box input{
            padding:14px;
            border:1px solid #cbd5e1;
            border-radius:8px;
            font-size:16px;
        }

        .submit-btn{
            padding:14px;
            border:none;
            border-radius:8px;
            background:#2563eb;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        .submit-btn:hover{
            background:#1d4ed8;
        }

        .back-btn{
            background:#111827;
        }

        .back-btn:hover{
            background:#000000;
        }

    </style>

</head>

<body>

    <div class="container">

        <!-- SUPERVISOR SECTION -->

        <div class="left-section">

            <div class="panel-emoji">👨‍💼</div>

            <h1>Supervisor Panel</h1>

            <button class="login-btn" onclick="showSupervisorLogin()">
                Login as Supervisor
            </button>

            <a class="signin-link" onclick="showSupervisorSignup()">
                Sign Up
            </a>

        </div>

        <!-- MEMBER SECTION -->

        <div class="right-section">

            <div class="panel-emoji">👥</div>

            <h1>Members Panel</h1>

            <button class="member-btn" onclick="showMemberLogin()">
                Login as Member
            </button>

            <a class="member-signin" onclick="showMemberSignup()">
                Sign Up
            </a>

        </div>

    </div>

    <script>

        function goHome(){
            location.reload();
        }

        /* SUPERVISOR LOGIN */

        function showSupervisorLogin(){

            document.body.innerHTML = `

            <div class="form-page">

                <div class="form-box">

                    <h1>Supervisor Login</h1>

                    <input type="text" placeholder="Supervisor ID">

                    <input type="text" placeholder="Supervisor Name">

                    <button class="submit-btn"
                    onclick="window.location.href='./supervisor-dashboard.html'">

                        Submit

                    </button>

                    <button class="submit-btn back-btn" onclick="goHome()">

                        Back

                    </button>

                </div>

            </div>
            `;
        }

        /* SUPERVISOR SIGNUP */

        function showSupervisorSignup(){

            document.body.innerHTML = `

            <div class="form-page">

                <div class="form-box">

                    <h1>Supervisor Sign Up</h1>

                    <input type="text" placeholder="Full Name">

                    <input type="email" placeholder="Email">

                    <input type="text" placeholder="Create Supervisor ID">

                    <input type="password" placeholder="Create Password">

                    <button class="submit-btn"
                    onclick="window.location.href='./supervisor-dashboard.html'">

                        Create Account

                    </button>

                    <button class="submit-btn back-btn" onclick="goHome()">

                        Back

                    </button>

                </div>

            </div>
            `;
        }

        /* MEMBER LOGIN */

        function showMemberLogin(){

            document.body.innerHTML = `

            <div class="form-page">

                <div class="form-box">

                    <h1>Member Login</h1>

                    <input type="text" placeholder="Member ID">

                    <input type="password" placeholder="Password">

                    <button class="submit-btn">

                        Login

                    </button>

                    <button class="submit-btn back-btn" onclick="goHome()">

                        Back

                    </button>

                </div>

            </div>
            `;
        }

        /* MEMBER SIGNUP */

        function showMemberSignup(){

            document.body.innerHTML = `

            <div class="form-page">

                <div class="form-box">

                    <h1>Member Sign Up</h1>

                    <input type="text" placeholder="Full Name">

                    <input type="email" placeholder="Email">

                    <input type="text" placeholder="Unique UID">

                    <input type="password" placeholder="Create Password">

                    <button class="submit-btn">

                        Create Account

                    </button>

                    <button class="submit-btn back-btn" onclick="goHome()">

                        Back

                    </button>

                </div>

            </div>
            `;
        }

    </script>

</body>
</html>
