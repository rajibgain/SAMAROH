<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supervisor Login</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#f3f4f6;
        }

        .login-box{
            width:400px;
            background:white;
            padding:40px;
            border-radius:12px;
            box-shadow:0 5px 20px rgba(0,0,0,0.2);
            display:flex;
            flex-direction:column;
            gap:20px;
        }

        h1{
            text-align:center;
            color:#1e293b;
        }

        input{
            padding:14px;
            border:1px solid #cbd5e1;
            border-radius:8px;
            font-size:16px;
        }

        button{
            padding:14px;
            border:none;
            border-radius:8px;
            background:#2563eb;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#1d4ed8;
        }

    </style>
</head>
<body>

    <div class="login-box">

        <h1>Supervisor Login</h1>

        <input type="text" placeholder="Enter Supervisor ID">

        <input type="text" placeholder="Enter Name">

        <button>Submit</button>

    </div>

</body>
</html>
